<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>소식 - BMI C&S</title>
  <link rel="stylesheet" href="shared-styles.css">
  <style>
    /* 목록 */
    .news-list { margin-top: 32px; }
    .news-list-item {
      display: flex; align-items: center; gap: 16px;
      padding: 18px 0; border-bottom: 1px solid var(--color-border-light);
      cursor: pointer; transition: background 0.15s;
    }
    .news-list-item:first-child { border-top: 1px solid var(--color-border-light); }
    .news-list-item:hover .news-list-title { color: var(--color-accent); }
    .news-list-category {
      flex-shrink: 0; display: inline-block;
      padding: 3px 10px; border-radius: 980px;
      font-size: 11px; font-weight: 600;
      background: rgba(41,151,255,0.1); color: var(--color-accent);
      white-space: nowrap;
    }
    .news-list-title {
      flex: 1; font-size: 16px; font-weight: 600;
      color: var(--color-text-primary); line-height: 1.4;
      transition: color 0.2s;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .news-list-summary {
      flex: 2; font-size: 13px; color: var(--color-text-secondary);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .news-list-date {
      flex-shrink: 0; font-size: 12px; color: var(--color-text-muted);
      white-space: nowrap;
    }

    /* 상세 */
    .news-detail { display: none; max-width: 720px; margin: 0 auto; padding: 40px 0; }
    .news-detail.active { display: block; }
    .news-back-btn {
      display: inline-flex; align-items: center; gap: 6px;
      font-size: 14px; color: var(--color-text-secondary);
      cursor: pointer; margin-bottom: 32px;
      background: none; border: none; font-family: inherit;
      transition: color 0.2s; padding: 0;
    }
    .news-back-btn:hover { color: var(--color-accent); }
    .news-detail-category {
      display: inline-block; padding: 4px 12px; border-radius: 980px;
      font-size: 12px; font-weight: 600;
      background: rgba(41,151,255,0.1); color: var(--color-accent);
      margin-bottom: 16px;
    }
    .news-detail-title {
      font-size: 28px; font-weight: 800; line-height: 1.35;
      letter-spacing: -0.03em; color: var(--color-text-primary);
      margin-bottom: 10px;
    }
    .news-detail-date {
      font-size: 13px; color: var(--color-text-muted); margin-bottom: 28px;
    }
    .news-detail-divider {
      border: none; border-top: 1px solid var(--color-border-light);
      margin-bottom: 28px;
    }
    .news-detail-thumb {
      width: 100%; border-radius: 14px; margin-bottom: 28px;
      max-height: 420px; object-fit: cover;
      box-shadow: 0 4px 20px rgba(0,0,0,0.08);
    }
    .news-detail-content {
      font-size: 16px; line-height: 1.9; color: var(--color-text-primary);
      white-space: pre-wrap;
    }
    .news-detail-content .news-body-img {
      display: block; max-width: 100%; border-radius: 12px;
      margin: 20px 0; box-shadow: 0 2px 12px rgba(0,0,0,0.08);
    }

    .news-empty {
      text-align: center; padding: 80px 24px;
    }
    .news-empty-icon { font-size: 56px; margin-bottom: 16px; }
    .news-empty p { font-size: 16px; color: var(--color-text-muted); }

    @media (max-width: 480px) {
      .news-list-summary { display: none; }
      .news-detail-title { font-size: 22px; }
    }
  </style>
</head>
<body>

<div id="nav-placeholder"></div>

<!-- HERO -->
<section class="hero" style="min-height:calc(60vh + 50px)">
  <div class="hero-content">
    <div class="hero-badge">News</div>
    <h1 data-i18n="news.hero.h1">BMI C&S <span class="gradient-text">소식</span></h1>
    <p data-i18n="news.hero.desc">회사의 최신 소식과 주요 활동을 전해드립니다.</p>
  </div>
</section>

<!-- NEWS -->
<section class="section">
  <div class="section-inner">
    <!-- 목록 -->
    <div id="newsList">
      <div class="news-empty">
        <div class="news-empty-icon">📰</div>
        <p>등록된 소식이 없습니다.</p>
      </div>
    </div>

    <!-- 상세 -->
    <div class="news-detail" id="newsDetail">
      <button class="news-back-btn" onclick="showList()" data-i18n="news.back">← 목록으로</button>
      <div id="newsDetailContent"></div>
    </div>
  </div>
</section>

<div id="footer-placeholder"></div>

<script src="i18n.js"></script>
<script src="supabase-config.js"></script>
<script src="includes.js"></script>
<script>
var _newsList = [];
var categoryIcons = { '회사소식': '🏢', '수주': '🤝', '파트너십': '🔗', '공지': '📢', '기술': '💡' };

function formatDate(str) {
  if (!str) return '-';
  var d = new Date(str);
  return d.getFullYear() + '.' + String(d.getMonth()+1).padStart(2,'0') + '.' + String(d.getDate()).padStart(2,'0');
}

function esc(str) {
  if (!str) return '';
  var div = document.createElement('div');
  div.appendChild(document.createTextNode(str));
  return div.innerHTML;
}

(async function() {
  var listEl = document.getElementById('newsList');
  try {
    _newsList = await sbSelect('news', 'select=*&order=created_at.desc');
  } catch(e) {
    listEl.innerHTML = '<p style="text-align:center;color:var(--color-text-muted)">소식을 불러오는 중 오류가 발생했습니다.</p>';
    return;
  }

  if (_newsList.length === 0) return;

  var html = '<div class="news-list">';
  _newsList.forEach(function(news, idx) {
    html += '<div class="news-list-item" onclick="showDetail(' + idx + ')">';
    html += '<span class="news-list-category">' + esc(news.category || '회사소식') + '</span>';
    html += '<span class="news-list-title">' + esc(news.title) + '</span>';
    if (news.summary) html += '<span class="news-list-summary">' + esc(news.summary) + '</span>';
    html += '<span class="news-list-date">' + formatDate(news.created_at) + '</span>';
    html += '</div>';
  });
  html += '</div>';
  listEl.innerHTML = html;
})();

function showDetail(idx) {
  var news = _newsList[idx];
  if (!news) return;

  var bodyContent = esc(news.content || news.summary || '');
  var bodyImgs = Array.isArray(news.body_images) ? news.body_images : [];
  bodyImgs.forEach(function(img) {
    bodyContent = bodyContent.split(esc(img.tag)).join(
      '</span><img class="news-body-img" src="' + img.data + '" alt=""><span>'
    );
  });

  var html = '<span class="news-detail-category">' + esc(news.category || '회사소식') + '</span>';
  html += '<div class="news-detail-title">' + esc(news.title) + '</div>';
  html += '<div class="news-detail-date">' + formatDate(news.created_at) + '</div>';
  html += '<hr class="news-detail-divider">';
  if (news.thumbnail) {
    html += '<img class="news-detail-thumb" src="' + esc(news.thumbnail) + '" alt="">';
  }
  html += '<div class="news-detail-content"><span>' + bodyContent + '</span></div>';

  document.getElementById('newsDetailContent').innerHTML = html;
  document.getElementById('newsList').style.display = 'none';
  document.getElementById('newsDetail').classList.add('active');
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function showList() {
  document.getElementById('newsDetail').classList.remove('active');
  document.getElementById('newsList').style.display = '';
}
</script>

</body>
</html>
