<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>소식 - BMI C&S</title>
  <link rel="stylesheet" href="shared-styles.css">
  <style>
    .news-grid {
      display: grid; grid-template-columns: repeat(3, 1fr); gap: 24px;
      margin-top: 40px;
    }
    .news-card {
      background: var(--color-white); border-radius: 16px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.06);
      overflow: hidden; transition: transform 0.3s, box-shadow 0.3s;
      cursor: pointer;
    }
    .news-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 8px 30px rgba(0,0,0,0.1);
    }
    .news-card-thumb {
      width: 100%; height: 200px; object-fit: cover;
      background: var(--color-fill);
    }
    .news-card-thumb-placeholder {
      width: 100%; height: 200px; background: linear-gradient(135deg, #0a1628 0%, #1a3a5c 100%);
      display: flex; align-items: center; justify-content: center;
      font-size: 48px;
    }
    .news-card-body { padding: 24px; }
    .news-card-category {
      display: inline-block; padding: 4px 12px; border-radius: 980px;
      font-size: 11px; font-weight: 600;
      background: rgba(41,151,255,0.1); color: var(--color-accent);
      margin-bottom: 12px;
    }
    .news-card-title {
      font-size: 18px; font-weight: 700; line-height: 1.4;
      color: var(--color-text-primary); margin-bottom: 8px;
      letter-spacing: -0.02em;
      display: -webkit-box; -webkit-line-clamp: 2;
      -webkit-box-orient: vertical; overflow: hidden;
    }
    .news-card-summary {
      font-size: 14px; color: var(--color-text-secondary); line-height: 1.6;
      display: -webkit-box; -webkit-line-clamp: 3;
      -webkit-box-orient: vertical; overflow: hidden;
    }
    .news-card-date {
      font-size: 12px; color: var(--color-text-muted); margin-top: 16px;
    }

    /* Detail modal */
    .news-modal {
      display: none; position: fixed; inset: 0; z-index: 10000;
      background: rgba(0,0,0,0.5); backdrop-filter: blur(8px);
      align-items: center; justify-content: center; padding: 24px;
    }
    .news-modal.active { display: flex; }
    .news-modal-box {
      background: var(--color-white); border-radius: 20px;
      width: 100%; max-width: 680px; padding: 40px;
      box-shadow: 0 24px 80px rgba(0,0,0,0.2);
      max-height: 85vh; overflow-y: auto;
    }
    .news-modal-category {
      display: inline-block; padding: 4px 12px; border-radius: 980px;
      font-size: 12px; font-weight: 600;
      background: rgba(41,151,255,0.1); color: var(--color-accent);
      margin-bottom: 16px;
    }
    .news-modal-title {
      font-size: 24px; font-weight: 700; line-height: 1.35;
      letter-spacing: -0.03em; margin-bottom: 8px;
    }
    .news-modal-date {
      font-size: 13px; color: var(--color-text-muted); margin-bottom: 24px;
    }
    .news-modal-content {
      font-size: 15px; line-height: 1.8; color: var(--color-text-primary);
      white-space: pre-wrap;
    }
    .news-modal-close {
      margin-top: 28px; width: 100%; padding: 13px;
      border: none; border-radius: 12px; background: var(--color-fill);
      font-size: 14px; font-weight: 600; cursor: pointer;
      font-family: inherit; transition: background 0.2s;
    }
    .news-modal-close:hover { background: var(--color-border-light); }

    .news-empty {
      text-align: center; padding: 80px 24px;
    }
    .news-empty-icon { font-size: 56px; margin-bottom: 16px; }
    .news-empty p { font-size: 16px; color: var(--color-text-muted); }

    @media (max-width: 834px) {
      .news-grid { grid-template-columns: repeat(2, 1fr); }
    }
    @media (max-width: 480px) {
      .news-grid { grid-template-columns: 1fr; }
      .news-modal-box { padding: 28px 20px; }
    }
  </style>
</head>
<body>

<div id="nav-placeholder"></div>

<!-- HERO -->
<section class="hero" style="min-height: 340px">
  <div class="hero-content">
    <div class="hero-badge">News</div>
    <h1>BMI C&S <span class="gradient-text">소식</span></h1>
    <p>회사의 최신 소식과 주요 활동을 전해드립니다.</p>
  </div>
</section>

<!-- NEWS LIST -->
<section class="section">
  <div class="section-inner">
    <div id="newsContainer">
      <div class="news-empty">
        <div class="news-empty-icon">📰</div>
        <p>등록된 소식이 없습니다.</p>
      </div>
    </div>
  </div>
</section>

<!-- News Detail Modal -->
<div class="news-modal" id="newsModal">
  <div class="news-modal-box" id="newsModalContent"></div>
</div>

<div id="footer-placeholder"></div>

<script src="includes.js"></script>
<script>
(function() {
  var newsList = JSON.parse(localStorage.getItem('bmicns_news') || '[]');
  var container = document.getElementById('newsContainer');

  // Sort by date desc
  newsList.sort(function(a, b) { return (b.date || '').localeCompare(a.date || ''); });

  if (newsList.length === 0) return;

  var categoryIcons = {
    '회사소식': '🏢', '수주': '🤝', '파트너십': '🔗', '공지': '📢', '기술': '💡'
  };

  var html = '<div class="news-grid">';
  newsList.forEach(function(news, idx) {
    var icon = categoryIcons[news.category] || '📰';
    html += '<div class="news-card" onclick="showNewsDetail(' + idx + ')">';
    if (news.thumbnail) {
      html += '<img class="news-card-thumb" src="' + esc(news.thumbnail) + '" alt="">';
    } else {
      html += '<div class="news-card-thumb-placeholder">' + icon + '</div>';
    }
    html += '<div class="news-card-body">';
    html += '<span class="news-card-category">' + esc(news.category || '회사소식') + '</span>';
    html += '<div class="news-card-title">' + esc(news.title) + '</div>';
    html += '<div class="news-card-summary">' + esc(news.summary || '') + '</div>';
    html += '<div class="news-card-date">' + formatDate(news.date) + '</div>';
    html += '</div></div>';
  });
  html += '</div>';
  container.innerHTML = html;
})();

function showNewsDetail(idx) {
  var newsList = JSON.parse(localStorage.getItem('bmicns_news') || '[]');
  newsList.sort(function(a, b) { return (b.date || '').localeCompare(a.date || ''); });
  var news = newsList[idx];
  if (!news) return;

  var html = '<span class="news-modal-category">' + esc(news.category || '회사소식') + '</span>';
  html += '<div class="news-modal-title">' + esc(news.title) + '</div>';
  html += '<div class="news-modal-date">' + formatDate(news.date) + '</div>';
  html += '<div class="news-modal-content">' + esc(news.content || news.summary || '') + '</div>';
  html += '<button class="news-modal-close" onclick="closeNewsModal()">닫기</button>';

  document.getElementById('newsModalContent').innerHTML = html;
  document.getElementById('newsModal').classList.add('active');
}

function closeNewsModal() {
  document.getElementById('newsModal').classList.remove('active');
}

document.getElementById('newsModal').addEventListener('click', function(e) {
  if (e.target === this) closeNewsModal();
});

function esc(str) {
  if (!str) return '';
  var div = document.createElement('div');
  div.appendChild(document.createTextNode(str));
  return div.innerHTML;
}

function formatDate(str) {
  if (!str) return '-';
  var d = new Date(str);
  return d.getFullYear() + '.' + String(d.getMonth() + 1).padStart(2, '0') + '.' + String(d.getDate()).padStart(2, '0');
}
</script>

</body>
</html>
